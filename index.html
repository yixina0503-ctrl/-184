            margin: 0;
            padding: 0;
        }

        .folklore-container {
            display: grid;

            gap: 24px;
            padding: 40px 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .folklore-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .folklore-card:hover {
            transform: translateY(-8px);
            border-color: rgba(212, 175, 55, 0.4);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .card-image-box {
            height: 200px;
            width: 100%;
            overflow: hidden;
            position: relative;
            background: #000;
        }

        .card-image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .folklore-card:hover .card-image-box img {
            transform: scale(1.1);
        }

        .card-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            color: var(--gold);
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: bold;
            z-index: 10;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .map-section {
            height: 500px;
            width: 90%;
            max-width: 1400px;
            margin: 40px auto;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* Leaflet Dark Theme Overwrite */
        .leaflet-container {
            background: #020205 !important;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }

            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in {
            animation: fadeIn 0.8s ease-out forwards;
